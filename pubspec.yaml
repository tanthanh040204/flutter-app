name: first_flutter_project
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.3.0
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  flutter_map: ^8.3.0
  geolocator: ^14.0.2
  intl: ^0.20.2
  latlong2: ^0.9.1
  mobile_scanner: ^7.2.0
  mqtt_client: ^10.8.0
  provider: ^6.1.5+1
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "D:/project/Flutter project"
  min_sdk_android: 21
